<header>
  <button class="menu-toggle">
    <div class="label-wrapper">
      <span class="open-label">Menu</span>
      <span class="close-label">Close</span>
    </div>
    <svg
      viewBox="0 0 100 60"
      class="menu-icon"
      xmlns="http://www.w3.org/2000/svg"
    >
      <rect class="bar-top" x="15" y="15" width="50" height="10" rx="5" />

      <rect class="bar-bottom" x="35" y="35" width="50" height="10" rx="5" />
    </svg>
  </button>
</header>
